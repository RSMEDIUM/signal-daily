{% extends 'newsapp/base.html' %}
{% block content %}
<section class="form-page">
    <h1>{{ title }}</h1>
    <form method="post" class="content-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div class="form-group">{{ form.title.label_tag }}{{ form.title }}</div>
        <div class="form-group">{{ form.description.label_tag }}{{ form.description }}</div>
        <div class="form-group">{{ form.articles.label_tag }}{{ form.articles }}</div>
        <button type="submit" class="button">Save Newsletter</button>
    </form>
</section>
{% endblock %}
